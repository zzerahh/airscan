{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <h2 class="card-header" style="display: block;">⚠️ Confirm Delete</h2>
    
    <p style="margin: 1.5rem 0; font-size: 1.1rem;">
        Are you sure you want to delete <strong>"{{ item.name|escape }}"</strong>?
    </p>
    
    <form method="post" style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn-danger" style="background: #e53e3e; color: white; padding: 0.5rem 1.5rem;">Yes, Delete</button>
        <a href="{% url 'inventory_list' %}" class="btn" style="background: #cbd5e0; color: #4a5568; padding: 0.5rem 1.5rem;">Cancel</a>
    </form>
</div>
{% endblock %}
