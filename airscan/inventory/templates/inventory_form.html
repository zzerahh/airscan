{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-header" style="display: block; text-align: center;">{{ title }}</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit">💾 Save</button>
            <a href="{% url 'inventory_list' %}" class="btn" style="background: #cbd5e0; color: #4a5568;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
