{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 class="card-header" style="display: block; text-align: center;">👤 User Profile</h2>
    
    <form method="post">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" value="{{ user.username|escape }}" disabled style="background: #edf2f7;">
        
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email|escape }}" required>
        
        <button type="submit" style="width: 100%;">Update Email</button>
    </form>
    
    <hr style="margin: 1.5rem 0; border-color: #e2e8f0;">
    
    <div style="text-align: center;">
        <small style="color: #718096;">Member since: {{ user.date_joined|date:"F j, Y" }}</small>
    </div>
</div>
{% endblock %}
